<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumoba</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a12;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #e0e0f0;
        }
        #authBox {
            background: rgba(18, 18, 35, 0.95);
            border: 1px solid rgba(100, 80, 255, 0.2);
            border-radius: 24px;
            padding: 48px 40px;
            width: 400px;
            box-shadow: 0 0 80px rgba(80, 60, 200, 0.15);
        }
        #authBox h1 {
            text-align: center;
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #8b7aff, #5b6bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        #authBox .subtitle {
            text-align: center;
            opacity: 0.5;
            font-size: 13px;
            margin-bottom: 32px;
        }
        #authBox input {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #f0f0ff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        #authBox input:focus {
            border-color: rgba(100, 80, 255, 0.4);
            background: rgba(255, 255, 255, 0.06);
        }
        #authBox input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }
        #authBox .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }
        #authBox button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        #authBox .btn-primary {
            background: linear-gradient(135deg, #6b5bff, #4a4aff);
            color: #fff;
            box-shadow: 0 4px 20px rgba(80, 60, 255, 0.3);
        }
        #authBox .btn-primary:hover {
            transform: translateY(-2px);
        }
        #authBox .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #b0b0d0;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        #authBox .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        #authBox .error {
            color: #ff4477;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            min-height: 20px;
        }
        #authBox .switch-mode {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            opacity: 0.5;
            cursor: pointer;
            transition: 0.3s;
        }
        #authBox .switch-mode:hover {
            opacity: 0.8;
        }
        #success {
            display: none;
            text-align: center;
            padding: 20px;
            background: rgba(74, 216, 138, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(74, 216, 138, 0.2);
            margin-top: 16px;
            color: #4ad88a;
            font-weight: 600;
        }
        #status {
            margin-top: 12px;
            font-size: 12px;
            text-align: center;
            opacity: 0.5;
        }
        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="authBox">
        <h1>✦ LUMOBA</h1>
        <div class="subtitle">Вход в игру</div>
        <div id="authError" class="error"></div>
        <input type="text" id="authLogin" placeholder="Логин">
        <input type="password" id="authPass" placeholder="Пароль">
        <div class="btn-group">
            <button class="btn-primary" id="authBtn">Войти</button>
            <button class="btn-secondary" id="regBtn">Регистрация</button>
        </div>
        <div class="switch-mode" id="switchMode">Нет аккаунта? Зарегистрируйтесь</div>
        <div id="success">✅ Успешно!</div>
        <div id="status">Подключение...</div>
    </div>

    <script>
        // ============================================================
        //   ПРОСТАЯ РАБОТА С TURSO
        // ============================================================
        const DB_URL = 'https://lumoba-cursedd.aws-eu-west-1.turso.io/v1/query';
        const TOKEN = 'eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9.eyJhIjoicnciLCJpYXQiOjE3ODQ0MTAwMDksImlkIjoiMDE5Zjc3MWYtOTQwMS03ZjFkLWE3ZWUtYjEyYzVjYjI4NTA3Iiwia2lkIjoicWpYbEhLbElGQmJNX29uRDlaWEkyWFVfazVBT3h3X3JIMF9TcUZ6MmU0ZyIsInJpZCI6ImIxMDIxMzYxLWQ3ZGEtNGMzNC05MWQ4LWVjMTU4ZGUwNmU2ZCJ9.GBhD9cLc9UJvMUL1hK6lixqtZ1MwPLbII9fXgaYG2txsUUn9NRkI-5W3r3PXRJHgfFrEUbNT_52pOx4JV6bmDA';

        async function sendSQL(sql) {
            const response = await fetch(DB_URL, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    statements: [{ sql: sql }]
                })
            });
            return await response.json();
        }

        // ============================================================
        //   DOM
        // ============================================================
        const login = document.getElementById('authLogin');
        const pass = document.getElementById('authPass');
        const authBtn = document.getElementById('authBtn');
        const regBtn = document.getElementById('regBtn');
        const switchMode = document.getElementById('switchMode');
        const error = document.getElementById('authError');
        const success = document.getElementById('success');
        const status = document.getElementById('status');

        let isLogin = true;

        // ============================================================
        //   СОЗДАНИЕ ТАБЛИЦЫ
        // ============================================================
        async function createTable() {
            try {
                await sendSQL(`
                    CREATE TABLE IF NOT EXISTS users (
                        id INTEGER PRIMARY KEY AUTOINCREMENT,
                        username TEXT UNIQUE,
                        password TEXT,
                        rank TEXT DEFAULT 'Бронза',
                        level INTEGER DEFAULT 1
                    )
                `);
                status.textContent = '✅ Готово';
                return true;
            } catch (e) {
                status.textContent = '❌ Ошибка';
                error.textContent = 'Не могу подключиться к БД';
                return false;
            }
        }

        // ============================================================
        //   ВХОД
        // ============================================================
        async function loginUser() {
            const username = login.value.trim();
            const password = pass.value.trim();

            if (!username || !password) {
                error.textContent = 'Заполните все поля';
                return;
            }

            error.textContent = '';
            success.style.display = 'none';

            authBtn.classList.add('loading');
            regBtn.classList.add('loading');

            try {
                await createTable();

                const result = await sendSQL(`
                    SELECT * FROM users 
                    WHERE username = '${username}' 
                    AND password = '${password}'
                `);

                const rows = result.results?.[0]?.response?.result?.rows || [];

                if (rows.length === 0) {
                    error.textContent = '❌ Неверный логин или пароль';
                    return;
                }

                const user = rows[0];
                success.style.display = 'block';
                success.textContent = `✅ Привет, ${user.username}! (Уровень ${user.level})`;
                status.textContent = `👋 ${user.username}`;
                error.textContent = '';

            } catch (e) {
                error.textContent = '❌ Ошибка сервера';
                console.error(e);
            } finally {
                authBtn.classList.remove('loading');
                regBtn.classList.remove('loading');
            }
        }

        // ============================================================
        //   РЕГИСТРАЦИЯ
        // ============================================================
        async function registerUser() {
            const username = login.value.trim();
            const password = pass.value.trim();

            if (!username || !password) {
                error.textContent = 'Заполните все поля';
                return;
            }

            error.textContent = '';
            success.style.display = 'none';

            authBtn.classList.add('loading');
            regBtn.classList.add('loading');

            try {
                await createTable();

                // Проверка существования
                const check = await sendSQL(`
                    SELECT id FROM users WHERE username = '${username}'
                `);

                const exists = check.results?.[0]?.response?.result?.rows || [];

                if (exists.length > 0) {
                    error.textContent = '❌ Пользователь уже существует';
                    return;
                }

                // Создание
                await sendSQL(`
                    INSERT INTO users (username, password) 
                    VALUES ('${username}', '${password}')
                `);

                success.style.display = 'block';
                success.textContent = '✅ Аккаунт создан! Теперь войдите.';
                status.textContent = '✅ Регистрация успешна!';

                // Очищаем поля
                login.value = '';
                pass.value = '';

            } catch (e) {
                error.textContent = '❌ Ошибка сервера';
                console.error(e);
            } finally {
                authBtn.classList.remove('loading');
                regBtn.classList.remove('loading');
            }
        }

        // ============================================================
        //   СОБЫТИЯ
        // ============================================================
        authBtn.addEventListener('click', () => {
            if (isLogin) {
                loginUser();
            } else {
                registerUser();
            }
        });

        regBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            authBtn.textContent = isLogin ? 'Войти' : 'Создать';
            regBtn.textContent = isLogin ? 'Регистрация' : 'Войти';
            switchMode.textContent = isLogin ? 'Нет аккаунта? Зарегистрируйтесь' : 'Уже есть аккаунт? Войдите';
            error.textContent = '';
            success.style.display = 'none';
        });

        switchMode.addEventListener('click', () => {
            isLogin = !isLogin;
            authBtn.textContent = isLogin ? 'Войти' : 'Создать';
            regBtn.textContent = isLogin ? 'Регистрация' : 'Войти';
            switchMode.textContent = isLogin ? 'Нет аккаунта? Зарегистрируйтесь' : 'Уже есть аккаунт? Войдите';
            error.textContent = '';
            success.style.display = 'none';
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                authBtn.click();
            }
        });

        // ============================================================
        //   ЗАПУСК
        // ============================================================
        createTable();
    </script>
</body>
</html>
