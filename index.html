<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumoba - Вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a12;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #e0e0f0;
        }
        #authBox {
            background: rgba(18, 18, 35, 0.95);
            border: 1px solid rgba(100, 80, 255, 0.2);
            border-radius: 24px;
            padding: 48px 40px;
            width: 400px;
            box-shadow: 0 0 80px rgba(80, 60, 200, 0.15);
        }
        #authBox h1 {
            text-align: center;
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #8b7aff, #5b6bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        #authBox .subtitle {
            text-align: center;
            opacity: 0.5;
            font-size: 13px;
            margin-bottom: 32px;
        }
        #authBox input {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #f0f0ff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        #authBox input:focus {
            border-color: rgba(100, 80, 255, 0.4);
            background: rgba(255, 255, 255, 0.06);
        }
        #authBox input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }
        #authBox .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }
        #authBox button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        #authBox .btn-primary {
            background: linear-gradient(135deg, #6b5bff, #4a4aff);
            color: #fff;
            box-shadow: 0 4px 20px rgba(80, 60, 255, 0.3);
        }
        #authBox .btn-primary:hover {
            transform: translateY(-2px);
        }
        #authBox .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #b0b0d0;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        #authBox .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        #authBox .error {
            color: #ff4477;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            min-height: 20px;
        }
        #authBox .switch-mode {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            opacity: 0.5;
            cursor: pointer;
            transition: 0.3s;
        }
        #authBox .switch-mode:hover {
            opacity: 0.8;
        }
        #success {
            display: none;
            text-align: center;
            padding: 20px;
            background: rgba(74, 216, 138, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(74, 216, 138, 0.2);
            margin-top: 16px;
            color: #4ad88a;
            font-weight: 600;
        }
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
        #status {
            margin-top: 12px;
            font-size: 12px;
            text-align: center;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="authBox">
        <h1>✦ LUMOBA</h1>
        <div class="subtitle">Вход в игру</div>
        <div id="authError" class="error"></div>
        <input type="text" id="authLogin" placeholder="Логин" autocomplete="username">
        <input type="password" id="authPass" placeholder="Пароль" autocomplete="current-password">
        <div class="btn-group">
            <button class="btn-primary" id="authBtn">Войти</button>
            <button class="btn-secondary" id="regBtn">Регистрация</button>
        </div>
        <div class="switch-mode" id="switchMode">Нет аккаунта? Зарегистрируйтесь</div>
        <div id="success">✅ Успешно!</div>
        <div id="status">Подключение к серверу...</div>
    </div>

    <script>
        // ============================================================
        //   НАСТРОЙКИ БАЗЫ ДАННЫХ
        // ============================================================
        const DB_CONFIG = {
            url: 'https://lumoba-cursedd.aws-eu-west-1.turso.io/v1/query',
            token: 'eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9.eyJhIjoicnciLCJpYXQiOjE3ODQ0MTAwMDksImlkIjoiMDE5Zjc3MWYtOTQwMS03ZjFkLWE3ZWUtYjEyYzVjYjI4NTA3Iiwia2lkIjoicWpYbEhLbElGQmJNX29uRDlaWEkyWFVfazVBT3h3X3JIMF9TcUZ6MmU0ZyIsInJpZCI6ImIxMDIxMzYxLWQ3ZGEtNGMzNC05MWQ4LWVjMTU4ZGUwNmU2ZCJ9.GBhD9cLc9UJvMUL1hK6lixqtZ1MwPLbII9fXgaYG2txsUUn9NRkI-5W3r3PXRJHgfFrEUbNT_52pOx4JV6bmDA'
        };

        // ============================================================
        //   DOM ЭЛЕМЕНТЫ
        // ============================================================
        const authLogin = document.getElementById('authLogin');
        const authPass = document.getElementById('authPass');
        const authBtn = document.getElementById('authBtn');
        const regBtn = document.getElementById('regBtn');
        const switchMode = document.getElementById('switchMode');
        const authError = document.getElementById('authError');
        const success = document.getElementById('success');
        const status = document.getElementById('status');

        let isLoginMode = true;

        // ============================================================
        //   ФУНКЦИИ РАБОТЫ С БАЗОЙ
        // ============================================================
        async function queryDB(sql, params = []) {
            try {
                const response = await fetch(DB_CONFIG.url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${DB_CONFIG.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        statements: [{
                            sql: sql,
                            args: params
                        }]
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Ошибка запроса:', error);
                throw error;
            }
        }

        // ============================================================
        //   СОЗДАНИЕ ТАБЛИЦ (если нет)
        // ============================================================
        async function initDatabase() {
            try {
                status.textContent = 'Создание таблиц...';
                const sql = `
                    CREATE TABLE IF NOT EXISTS users (
                        id INTEGER PRIMARY KEY AUTOINCREMENT,
                        username TEXT UNIQUE NOT NULL,
                        password TEXT NOT NULL,
                        rank TEXT DEFAULT 'Бронза',
                        level INTEGER DEFAULT 1,
                        exp INTEGER DEFAULT 0,
                        gold INTEGER DEFAULT 500,
                        kills INTEGER DEFAULT 0,
                        deaths INTEGER DEFAULT 0,
                        class TEXT DEFAULT 'fighter',
                        clan TEXT DEFAULT 'Без клана',
                        created_at DATETIME DEFAULT CURRENT_TIMESTAMP
                    );
                `;
                await queryDB(sql);
                status.textContent = '✅ Готово';
                return true;
            } catch (error) {
                status.textContent = '❌ Ошибка подключения';
                authError.textContent = 'Не удалось подключиться к базе данных';
                console.error(error);
                return false;
            }
        }

        // ============================================================
        //   ХЕШИРОВАНИЕ ПАРОЛЯ (простое для демо)
        // ============================================================
        function hashPassword(password) {
            let hash = 0;
            for (let i = 0; i < password.length; i++) {
                const char = password.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return 'hash_' + Math.abs(hash).toString(36);
        }

        // ============================================================
        //   АВТОРИЗАЦИЯ
        // ============================================================
        async function handleAuth() {
            const login = authLogin.value.trim();
            const password = authPass.value.trim();

            if (!login || !password) {
                authError.textContent = 'Заполните все поля';
                return;
            }

            authError.textContent = '';
            success.style.display = 'none';

            // Блокируем кнопки
            authBtn.classList.add('loading');
            regBtn.classList.add('loading');

            try {
                // Инициализируем БД
                await initDatabase();

                const hashedPass = hashPassword(password);

                if (isLoginMode) {
                    // ВХОД
                    status.textContent = 'Проверка данных...';
                    const result = await queryDB(
                        'SELECT * FROM users WHERE username = ? AND password = ?',
                        [login, hashedPass]
                    );

                    if (!result.results || !result.results[0] || !result.results[0].response) {
                        throw new Error('Некорректный ответ от сервера');
                    }

                    const rows = result.results[0].response.result.rows || [];

                    if (rows.length === 0) {
                        authError.textContent = '❌ Неверный логин или пароль';
                        status.textContent = 'Ошибка входа';
                        return;
                    }

                    const user = rows[0];
                    success.style.display = 'block';
                    success.textContent = `✅ Добро пожаловать, ${user.username}!`;
                    status.textContent = `👋 Привет, ${user.username} (Уровень ${user.level})`;
                    authError.textContent = '';

                    // Показываем данные пользователя
                    console.log('Пользователь найден:', user);

                } else {
                    // РЕГИСТРАЦИЯ
                    status.textContent = 'Проверка логина...';

                    // Проверяем, существует ли пользователь
                    const checkResult = await queryDB(
                        'SELECT id FROM users WHERE username = ?',
                        [login]
                    );

                    const existingRows = checkResult.results?.[0]?.response?.result?.rows || [];

                    if (existingRows.length > 0) {
                        authError.textContent = '❌ Пользователь уже существует';
                        status.textContent = 'Ошибка регистрации';
                        return;
                    }

                    status.textContent = 'Создание аккаунта...';

                    // Создаём пользователя
                    await queryDB(
                        `INSERT INTO users (username, password, rank, level, exp, gold, class, clan) 
                         VALUES (?, ?, 'Бронза', 1, 0, 500, 'fighter', 'Без клана')`,
                        [login, hashedPass]
                    );

                    success.style.display = 'block';
                    success.textContent = '✅ Аккаунт создан! Теперь войдите.';
                    status.textContent = '✅ Регистрация успешна!';

                    // Переключаем на вход
                    isLoginMode = true;
                    authBtn.textContent = 'Войти';
                    regBtn.textContent = 'Регистрация';
                    switchMode.textContent = 'Нет аккаунта? Зарегистрируйтесь';

                    authLogin.value = '';
                    authPass.value = '';
                }

            } catch (error) {
                console.error('Ошибка:', error);
                authError.textContent = `❌ Ошибка: ${error.message || 'Неизвестная ошибка'}`;
                status.textContent = '❌ Ошибка';
            } finally {
                authBtn.classList.remove('loading');
                regBtn.classList.remove('loading');
            }
        }

        // ============================================================
        //   ОБРАБОТЧИКИ СОБЫТИЙ
        // ============================================================
        authBtn.addEventListener('click', handleAuth);

        regBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authBtn.textContent = isLoginMode ? 'Войти' : 'Создать';
            regBtn.textContent = isLoginMode ? 'Регистрация' : 'Войти';
            switchMode.textContent = isLoginMode ? 'Нет аккаунта? Зарегистрируйтесь' : 'Уже есть аккаунт? Войдите';
            authError.textContent = '';
            success.style.display = 'none';
        });

        switchMode.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authBtn.textContent = isLoginMode ? 'Войти' : 'Создать';
            regBtn.textContent = isLoginMode ? 'Регистрация' : 'Войти';
            switchMode.textContent = isLoginMode ? 'Нет аккаунта? Зарегистрируйтесь' : 'Уже есть аккаунт? Войдите';
            authError.textContent = '';
            success.style.display = 'none';
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleAuth();
            }
        });

        // ============================================================
        //   ПРОВЕРКА ПОДКЛЮЧЕНИЯ ПРИ ЗАГРУЗКЕ
        // ============================================================
        async function checkConnection() {
            try {
                status.textContent = 'Проверка подключения...';
                await queryDB('SELECT 1');
                status.textContent = '✅ Подключено к серверу';
            } catch (error) {
                status.textContent = '❌ Нет подключения к серверу';
                authError.textContent = 'Не удалось подключиться к базе данных. Проверьте интернет.';
                console.error(error);
            }
        }

        // Запускаем проверку
        checkConnection();
    </script>
</body>
</html>
