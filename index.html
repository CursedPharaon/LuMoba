<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumoba</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a12;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #e0e0f0;
        }
        #authBox {
            background: rgba(18, 18, 35, 0.95);
            border: 1px solid rgba(100, 80, 255, 0.2);
            border-radius: 24px;
            padding: 48px 40px;
            width: 400px;
            box-shadow: 0 0 80px rgba(80, 60, 200, 0.15);
        }
        #authBox h1 {
            text-align: center;
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #8b7aff, #5b6bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        #authBox .subtitle {
            text-align: center;
            opacity: 0.5;
            font-size: 13px;
            margin-bottom: 32px;
        }
        #authBox input {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #f0f0ff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        #authBox input:focus {
            border-color: rgba(100, 80, 255, 0.4);
            background: rgba(255, 255, 255, 0.06);
        }
        #authBox input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }
        #authBox .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }
        #authBox button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        #authBox .btn-primary {
            background: linear-gradient(135deg, #6b5bff, #4a4aff);
            color: #fff;
            box-shadow: 0 4px 20px rgba(80, 60, 255, 0.3);
        }
        #authBox .btn-primary:hover {
            transform: translateY(-2px);
        }
        #authBox .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #b0b0d0;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        #authBox .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        #authBox .error {
            color: #ff4477;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            min-height: 20px;
        }
        #authBox .switch-mode {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            opacity: 0.5;
            cursor: pointer;
            transition: 0.3s;
        }
        #authBox .switch-mode:hover {
            opacity: 0.8;
        }
        #success {
            display: none;
            text-align: center;
            padding: 20px;
            background: rgba(74, 216, 138, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(74, 216, 138, 0.2);
            margin-top: 16px;
            color: #4ad88a;
            font-weight: 600;
        }
        #status {
            margin-top: 12px;
            font-size: 12px;
            text-align: center;
            opacity: 0.5;
        }
        #status.connected {
            color: #4ad88a;
        }
        #status.error {
            color: #ff4477;
        }
        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
        #statsBox {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        #statsBox .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 14px;
        }
        #statsBox .stat-row .label {
            opacity: 0.5;
        }
        #statsBox .stat-row .value {
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="authBox">
        <h1>✦ LUMOBA</h1>
        <div class="subtitle">Вход в игру</div>
        <div id="authError" class="error"></div>
        <input type="text" id="authLogin" placeholder="Логин">
        <input type="password" id="authPass" placeholder="Пароль">
        <div class="btn-group">
            <button class="btn-primary" id="authBtn">Войти</button>
            <button class="btn-secondary" id="regBtn">Регистрация</button>
        </div>
        <div class="switch-mode" id="switchMode">Нет аккаунта? Зарегистрируйтесь</div>
        <div id="success">✅ Успешно!</div>
        <div id="status">Проверка сервера...</div>
        <div id="statsBox"></div>
    </div>

    <script>
        // ============================================================
        //   НАСТРОЙКИ
        // ============================================================
        const API_URL = 'https://lumoba-server.onrender.com';

        // ============================================================
        //   DOM
        // ============================================================
        const login = document.getElementById('authLogin');
        const pass = document.getElementById('authPass');
        const authBtn = document.getElementById('authBtn');
        const regBtn = document.getElementById('regBtn');
        const switchMode = document.getElementById('switchMode');
        const error = document.getElementById('authError');
        const success = document.getElementById('success');
        const status = document.getElementById('status');
        const statsBox = document.getElementById('statsBox');

        let isLogin = true;
        let currentUser = null;

        // ============================================================
        //   ФУНКЦИИ
        // ============================================================
        async function apiCall(endpoint, data) {
            const response = await fetch(`${API_URL}/${endpoint}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });
            return await response.json();
        }

        async function checkServer() {
            try {
                const response = await fetch(`${API_URL}/top`);
                if (response.ok) {
                    status.textContent = '✅ Сервер работает';
                    status.className = 'connected';
                    return true;
                }
            } catch (e) {
                status.textContent = '❌ Сервер не запущен! Запустите server.py';
                status.className = 'error';
                return false;
            }
        }

        async function loginUser() {
            const username = login.value.trim();
            const password = pass.value.trim();

            if (!username || !password) {
                error.textContent = 'Заполните все поля';
                return;
            }

            error.textContent = '';
            success.style.display = 'none';

            authBtn.classList.add('loading');
            regBtn.classList.add('loading');

            try {
                const result = await apiCall('login', { username, password });

                if (result.error) {
                    error.textContent = '❌ ' + result.error;
                    return;
                }

                currentUser = result.user;
                success.style.display = 'block';
                success.textContent = `✅ Привет, ${currentUser.username}!`;
                status.textContent = `👋 ${currentUser.username} (Уровень ${currentUser.level})`;
                error.textContent = '';

                // Показываем статистику
                showStats(currentUser);

            } catch (e) {
                error.textContent = '❌ Ошибка: ' + e.message;
                console.error(e);
            } finally {
                authBtn.classList.remove('loading');
                regBtn.classList.remove('loading');
            }
        }

        async function registerUser() {
            const username = login.value.trim();
            const password = pass.value.trim();

            if (!username || !password) {
                error.textContent = 'Заполните все поля';
                return;
            }

            error.textContent = '';
            success.style.display = 'none';

            authBtn.classList.add('loading');
            regBtn.classList.add('loading');

            try {
                const result = await apiCall('register', { username, password });

                if (result.error) {
                    error.textContent = '❌ ' + result.error;
                    return;
                }

                success.style.display = 'block';
                success.textContent = '✅ Аккаунт создан! Теперь войдите.';
                status.textContent = '✅ Регистрация успешна!';

                login.value = '';
                pass.value = '';

            } catch (e) {
                error.textContent = '❌ Ошибка: ' + e.message;
                console.error(e);
            } finally {
                authBtn.classList.remove('loading');
                regBtn.classList.remove('loading');
            }
        }

        function showStats(user) {
            statsBox.style.display = 'block';
            statsBox.innerHTML = `
                <div class="stat-row">
                    <span class="label">👤 Имя</span>
                    <span class="value">${user.username}</span>
                </div>
                <div class="stat-row">
                    <span class="label">⭐ Ранг</span>
                    <span class="value">${user.rank}</span>
                </div>
                <div class="stat-row">
                    <span class="label">⚔️ Уровень</span>
                    <span class="value">${user.level}</span>
                </div>
                <div class="stat-row">
                    <span class="label">💀 Убийства</span>
                    <span class="value">${user.kills}</span>
                </div>
                <div class="stat-row">
                    <span class="label">🪦 Смерти</span>
                    <span class="value">${user.deaths}</span>
                </div>
                <div class="stat-row">
                    <span class="label">🪙 Золото</span>
                    <span class="value" style="color:#ffd866;">${user.gold}</span>
                </div>
                <div class="stat-row">
                    <span class="label">🎯 Класс</span>
                    <span class="value">${user.class}</span>
                </div>
                <div class="stat-row">
                    <span class="label">🏰 Клан</span>
                    <span class="value">${user.clan}</span>
                </div>
            `;
        }

        // ============================================================
        //   СОБЫТИЯ
        // ============================================================
        authBtn.addEventListener('click', () => {
            if (isLogin) {
                loginUser();
            } else {
                registerUser();
            }
        });

        regBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            authBtn.textContent = isLogin ? 'Войти' : 'Создать';
            regBtn.textContent = isLogin ? 'Регистрация' : 'Войти';
            switchMode.textContent = isLogin ? 'Нет аккаунта? Зарегистрируйтесь' : 'Уже есть аккаунт? Войдите';
            error.textContent = '';
            success.style.display = 'none';
            statsBox.style.display = 'none';
        });

        switchMode.addEventListener('click', () => {
            isLogin = !isLogin;
            authBtn.textContent = isLogin ? 'Войти' : 'Создать';
            regBtn.textContent = isLogin ? 'Регистрация' : 'Войти';
            switchMode.textContent = isLogin ? 'Нет аккаунта? Зарегистрируйтесь' : 'Уже есть аккаунт? Войдите';
            error.textContent = '';
            success.style.display = 'none';
            statsBox.style.display = 'none';
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                authBtn.click();
            }
        });

        // ============================================================
        //   ЗАПУСК
        // ============================================================
        checkServer();
    </script>
</body>
</html>
