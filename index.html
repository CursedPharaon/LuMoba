<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumoba</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a12;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #e0e0f0;
        }
        #authBox {
            background: rgba(18, 18, 35, 0.95);
            border: 1px solid rgba(100, 80, 255, 0.2);
            border-radius: 24px;
            padding: 48px 40px;
            width: 420px;
            box-shadow: 0 0 80px rgba(80, 60, 200, 0.15);
        }
        #authBox h1 {
            text-align: center;
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #8b7aff, #5b6bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        #authBox .subtitle {
            text-align: center;
            opacity: 0.4;
            font-size: 12px;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        #authBox input {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #f0f0ff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        #authBox input:focus {
            border-color: rgba(100, 80, 255, 0.4);
            background: rgba(255, 255, 255, 0.06);
        }
        #authBox input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }
        #authBox .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }
        #authBox button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        #authBox .btn-primary {
            background: linear-gradient(135deg, #6b5bff, #4a4aff);
            color: #fff;
            box-shadow: 0 4px 20px rgba(80, 60, 255, 0.3);
        }
        #authBox .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(80, 60, 255, 0.4);
        }
        #authBox .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        #authBox .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #b0b0d0;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        #authBox .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        #authBox .error {
            color: #ff4477;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
            min-height: 20px;
        }
        #authBox .switch-mode {
            text-align: center;
            margin-top: 14px;
            font-size: 13px;
            opacity: 0.4;
            cursor: pointer;
            transition: 0.3s;
        }
        #authBox .switch-mode:hover {
            opacity: 0.7;
        }
        #success {
            display: none;
            text-align: center;
            padding: 16px;
            background: rgba(74, 216, 138, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(74, 216, 138, 0.2);
            margin-top: 14px;
            color: #4ad88a;
            font-weight: 600;
            font-size: 14px;
        }
        #status {
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
            opacity: 0.5;
        }
        #status.connected {
            color: #4ad88a;
            opacity: 1;
        }
        #status.error {
            color: #ff4477;
            opacity: 1;
        }
        #statsBox {
            margin-top: 16px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: none;
        }
        #statsBox .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
        }
        #statsBox .stat-row .label {
            opacity: 0.4;
        }
        #statsBox .stat-row .value {
            font-weight: 600;
        }
        .rank-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        .rank-bronze { background: rgba(205, 127, 50, 0.2); color: #cd7f32; }
        .rank-silver { background: rgba(192, 192, 192, 0.2); color: #c0c0c0; }
        .rank-gold { background: rgba(255, 215, 0, 0.2); color: #ffd700; }
        .rank-platinum { background: rgba(229, 228, 226, 0.2); color: #e5e4e2; }
        .rank-diamond { background: rgba(185, 242, 255, 0.2); color: #b9f2ff; }
        .rank-mythic { background: rgba(255, 107, 255, 0.2); color: #ff6bff; }
        .rank-legend { background: rgba(255, 51, 102, 0.2); color: #ff3366; }
    </style>
</head>
<body>
    <div id="authBox">
        <h1>✦ LUMOBA</h1>
        <div class="subtitle">ВХОД В ИГРУ</div>
        <div id="authError" class="error"></div>
        <input type="text" id="authLogin" placeholder="Логин">
        <input type="password" id="authPass" placeholder="Пароль">
        <div class="btn-group">
            <button class="btn-primary" id="authBtn">Войти</button>
            <button class="btn-secondary" id="regBtn">Регистрация</button>
        </div>
        <div class="switch-mode" id="switchMode">Нет аккаунта? Зарегистрируйтесь</div>
        <div id="success">✅ Успешно!</div>
        <div id="status">🔄 Проверка сервера...</div>
        <div id="statsBox"></div>
    </div>

    <script>
        // ============================================================
        //   НАСТРОЙКИ - ЗДЕСЬ ВАША ССЫЛКА НА RENDER
        // ============================================================
        const API_URL = 'https://lumoba.onrender.com/api/query'; // ЗАМЕНИТЕ!

        // ============================================================
        //   ФУНКЦИЯ ЗАПРОСА К ПРОКСИ
        // ============================================================
        async function queryTurso(sql) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ sql: sql })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Ошибка запроса:', error);
                throw error;
            }
        }

        // ============================================================
        //   ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================================
        function safeString(val) {
            if (val === null || val === undefined) return '';
            return String(val);
        }

        function safeInt(val) {
            if (val === null || val === undefined) return 0;
            return parseInt(val) || 0;
        }

        function getRankBadge(rank) {
            const ranks = {
                'Бронза': 'bronze',
                'Серебро': 'silver',
                'Золото': 'gold',
                'Платина': 'platinum',
                'Алмаз': 'diamond',
                'Мифический': 'mythic',
                'Легенда': 'legend'
            };
            const cls = ranks[rank] || 'bronze';
            return `<span class="rank-badge rank-${cls}">${rank}</span>`;
        }

        // ============================================================
        //   DOM ЭЛЕМЕНТЫ
        // ============================================================
        const authLogin = document.getElementById('authLogin');
        const authPass = document.getElementById('authPass');
        const authBtn = document.getElementById('authBtn');
        const regBtn = document.getElementById('regBtn');
        const switchMode = document.getElementById('switchMode');
        const authError = document.getElementById('authError');
        const success = document.getElementById('success');
        const status = document.getElementById('status');
        const statsBox = document.getElementById('statsBox');

        let isLoginMode = true;
        let currentUser = null;

        // ============================================================
        //   СОЗДАНИЕ ТАБЛИЦЫ
        // ============================================================
        async function initDB() {
            try {
                const sql = `
                    CREATE TABLE IF NOT EXISTS users (
                        id INTEGER PRIMARY KEY AUTOINCREMENT,
                        username TEXT UNIQUE NOT NULL,
                        password TEXT NOT NULL,
                        rank TEXT DEFAULT 'Бронза',
                        level INTEGER DEFAULT 1,
                        gold INTEGER DEFAULT 500,
                        kills INTEGER DEFAULT 0,
                        deaths INTEGER DEFAULT 0,
                        exp INTEGER DEFAULT 0,
                        class TEXT DEFAULT 'fighter',
                        clan TEXT DEFAULT 'Без клана',
                        created_at DATETIME DEFAULT CURRENT_TIMESTAMP
                    )
                `;
                await queryTurso(sql);
                return true;
            } catch (error) {
                console.error('Ошибка создания таблицы:', error);
                return false;
            }
        }

        // ============================================================
        //   ВХОД
        // ============================================================
        async function loginUser() {
            const username = authLogin.value.trim();
            const password = authPass.value.trim();

            if (!username || !password) {
                authError.textContent = '❌ Заполните все поля';
                return;
            }

            authError.textContent = '';
            success.style.display = 'none';
            statsBox.style.display = 'none';

            authBtn.disabled = true;
            authBtn.textContent = '⏳ Подключение...';
            status.textContent = '🔄 Проверка...';
            status.className = '';

            try {
                await initDB();

                const safeName = username.replace(/'/g, "''");

                const result = await queryTurso(
                    `SELECT id, username, rank, level, gold, kills, deaths, exp, class, clan FROM users WHERE username = '${safeName}'`
                );

                const rows = result?.results?.[0]?.response?.result?.rows || [];

                if (rows.length === 0) {
                    throw new Error('❌ Пользователь не найден');
                }

                const user = rows[0];
                const dbPassword = safeString(user[1]);

                if (dbPassword !== password) {
                    throw new Error('❌ Неверный пароль!');
                }

                currentUser = {
                    id: user[0],
                    username: safeString(user[1]),
                    rank: safeString(user[2]),
                    level: safeInt(user[3]),
                    gold: safeInt(user[4]),
                    kills: safeInt(user[5]),
                    deaths: safeInt(user[6]),
                    exp: safeInt(user[7]),
                    class: safeString(user[8]),
                    clan: safeString(user[9])
                };

                success.style.display = 'block';
                success.textContent = `✅ Добро пожаловать, ${username}!`;
                status.textContent = `👋 ${username} (Уровень ${currentUser.level})`;
                status.className = 'connected';

                showStats(currentUser);

            } catch (error) {
                console.error('Ошибка входа:', error);
                authError.textContent = error.message || '❌ Ошибка входа';
                status.textContent = '❌ Ошибка входа';
                status.className = 'error';
            } finally {
                authBtn.disabled = false;
                authBtn.textContent = 'Войти';
            }
        }

        // ============================================================
        //   РЕГИСТРАЦИЯ
        // ============================================================
        async function registerUser() {
            const username = authLogin.value.trim();
            const password = authPass.value.trim();

            if (!username || !password) {
                authError.textContent = '❌ Заполните все поля';
                return;
            }

            authError.textContent = '';
            success.style.display = 'none';
            statsBox.style.display = 'none';

            authBtn.disabled = true;
            authBtn.textContent = '⏳ Подключение...';
            status.textContent = '🔄 Регистрация...';
            status.className = '';

            try {
                await initDB();

                const safeName = username.replace(/'/g, "''");
                const safePass = password.replace(/'/g, "''");

                const check = await queryTurso(
                    `SELECT id FROM users WHERE username = '${safeName}'`
                );

                const rows = check?.results?.[0]?.response?.result?.rows || [];

                if (rows.length > 0) {
                    throw new Error('❌ Пользователь уже существует');
                }

                await queryTurso(
                    `INSERT INTO users (username, password) VALUES ('${safeName}', '${safePass}')`
                );

                success.style.display = 'block';
                success.textContent = '✅ Аккаунт создан! Теперь войдите.';
                status.textContent = '✅ Регистрация успешна!';
                status.className = 'connected';

                authLogin.value = '';
                authPass.value = '';

                isLoginMode = true;
                authBtn.textContent = 'Войти';
                regBtn.textContent = 'Регистрация';
                switchMode.textContent = 'Нет аккаунта? Зарегистрируйтесь';

            } catch (error) {
                console.error('Ошибка регистрации:', error);
                authError.textContent = error.message || '❌ Ошибка регистрации';
                status.textContent = '❌ Ошибка регистрации';
                status.className = 'error';
            } finally {
                authBtn.disabled = false;
                authBtn.textContent = 'Регистрация';
            }
        }

        // ============================================================
        //   ПОКАЗ СТАТИСТИКИ
        // ============================================================
        function showStats(user) {
            statsBox.style.display = 'block';
            statsBox.innerHTML = `
                <div class="stat-row">
                    <span class="label">👤 Имя</span>
                    <span class="value">${user.username}</span>
                </div>
                <div class="stat-row">
                    <span class="label">⭐ Ранг</span>
                    <span class="value">${getRankBadge(user.rank)}</span>
                </div>
                <div class="stat-row">
                    <span class="label">⚔️ Уровень</span>
                    <span class="value">${user.level}</span>
                </div>
                <div class="stat-row">
                    <span class="label">💀 Убийства</span>
                    <span class="value">${user.kills}</span>
                </div>
                <div class="stat-row">
                    <span class="label">🪦 Смерти</span>
                    <span class="value">${user.deaths}</span>
                </div>
                <div class="stat-row">
                    <span class="label">🪙 Золото</span>
                    <span class="value" style="color:#ffd866;">${user.gold}</span>
                </div>
                <div class="stat-row">
                    <span class="label">✨ Опыт</span>
                    <span class="value">${user.exp}</span>
                </div>
                <div class="stat-row">
                    <span class="label">🎯 Класс</span>
                    <span class="value">${user.class}</span>
                </div>
                <div class="stat-row">
                    <span class="label">🏰 Клан</span>
                    <span class="value">${user.clan}</span>
                </div>
            `;
        }

        // ============================================================
        //   ОБРАБОТЧИКИ СОБЫТИЙ
        // ============================================================
        authBtn.addEventListener('click', () => {
            if (isLoginMode) {
                loginUser();
            } else {
                registerUser();
            }
        });

        regBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authBtn.textContent = isLoginMode ? 'Войти' : 'Создать';
            regBtn.textContent = isLoginMode ? 'Регистрация' : 'Войти';
            switchMode.textContent = isLoginMode ? 'Нет аккаунта? Зарегистрируйтесь' : 'Уже есть аккаунт? Войдите';
            authError.textContent = '';
            success.style.display = 'none';
            statsBox.style.display = 'none';
        });

        switchMode.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authBtn.textContent = isLoginMode ? 'Войти' : 'Создать';
            regBtn.textContent = isLoginMode ? 'Регистрация' : 'Войти';
            switchMode.textContent = isLoginMode ? 'Нет аккаунта? Зарегистрируйтесь' : 'Уже есть аккаунт? Войдите';
            authError.textContent = '';
            success.style.display = 'none';
            statsBox.style.display = 'none';
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                authBtn.click();
            }
        });

        // ============================================================
        //   ПРОВЕРКА СЕРВЕРА
        // ============================================================
        async function checkServer() {
            try {
                status.textContent = '🔄 Проверка сервера...';
                const response = await fetch(API_URL.replace('/query', ''), {
                    method: 'GET'
                });
                if (response.ok) {
                    status.textContent = '✅ Сервер работает!';
                    status.className = 'connected';
                } else {
                    throw new Error('Сервер не отвечает');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                status.textContent = '⚠️ Сервер недоступен. Проверьте ссылку.';
                status.className = 'error';
                authError.textContent = '⚠️ Сервер не запущен. Залейте main.py на Render.';
            }
        }

        checkServer();
    </script>
</body>
</html>
